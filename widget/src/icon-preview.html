<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HArvest Icon Bundle Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f0f0; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  p  { font-size: 13px; color: #666; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .tile {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 8px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: default;
  }
  .tile:hover { border-color: #888; background: #fafafa; }
  .tile svg { width: 32px; height: 32px; color: #222; }
  .tile .label {
    font-size: 10px;
    color: #555;
    text-align: center;
    word-break: break-all;
    line-height: 1.3;
  }
  .tile .label .domain { color: #999; }

  .controls { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .controls input { font-size: 13px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; width: 240px; }
  .controls label { font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .count { font-size: 12px; color: #888; }

  .dark-bg .tile { background: #1e1e1e; border-color: #444; }
  .dark-bg .tile svg { color: #fff; }
  .dark-bg .tile .label { color: #aaa; }
  .dark-bg .tile .label .domain { color: #666; }
  .dark-bg .tile:hover { border-color: #aaa; background: #2a2a2a; }
</style>
</head>
<body>
<h1>HArvest Icon Bundle</h1>
<p>All icons currently bundled in <code>icons.js</code>. Hover for full name. Use the filter to search.</p>

<div class="controls">
  <input type="text" id="filter" placeholder="Filter icons..." oninput="applyFilter()">
  <label><input type="checkbox" id="darkToggle" onchange="toggleDark()"> Dark background</label>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { MDI_ICONS } from "./icons.js";

const grid = document.getElementById("grid");
const countEl = document.getElementById("count");
let allTiles = [];

const entries = Object.entries(MDI_ICONS).sort(([a], [b]) => a.localeCompare(b));

for (const [name, path] of entries) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.title = name;
  tile.dataset.name = name.toLowerCase();

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", "currentColor");
  svg.setAttribute("aria-hidden", "true");
  const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  pathEl.setAttribute("d", path);
  svg.appendChild(pathEl);

  const label = document.createElement("div");
  label.className = "label";
  // Split "mdi:foo-bar" into "mdi:" and "foo-bar"
  const [prefix, ...rest] = name.split(":");
  label.innerHTML = `<span class="domain">${prefix}:</span>${rest.join(":")}`;

  tile.appendChild(svg);
  tile.appendChild(label);
  grid.appendChild(tile);
  allTiles.push({ tile, name: name.toLowerCase() });
}

updateCount();

window.applyFilter = function() {
  const q = document.getElementById("filter").value.toLowerCase().trim();
  for (const { tile, name } of allTiles) {
    tile.style.display = (!q || name.includes(q)) ? "" : "none";
  }
  updateCount();
};

window.toggleDark = function() {
  document.body.classList.toggle("dark-bg", document.getElementById("darkToggle").checked);
};

function updateCount() {
  const visible = allTiles.filter(({ tile }) => tile.style.display !== "none").length;
  countEl.textContent = `${visible} of ${allTiles.length} icons`;
}
</script>
</body>
</html>
