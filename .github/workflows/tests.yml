name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  python:
    name: Python integration (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # homeassistant 2026.6.2 requires Python >= 3.14.2.
          python-version: "3.14"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt
      - name: Run pytest
        run: python -m pytest

  wordpress:
    name: WordPress plugin (PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wordpress
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          # composer.json pins the platform to php 8.1.
          php-version: "8.1"
          tools: composer
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  widget:
    name: Widget (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: widget/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm test

  frontend:
    name: Panel frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm test
